[package]
name = "faust-build"
version = "0.2.1"
authors = ["Franz Heinzmann (Frando) <frando@unbiskant.org>", "obsoleszenz <obsoleszenz@riseup.net>"]
license = "MIT OR Apache-2.0"
edition = "2018"
description = "Build FAUST dsp files into Rust modules as part of the normal crate compilation"
readme = "../README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
faust-json =  { path = "../faust-json" }
tempfile = "3.2.0"
heck = "0.3.2"
prettyplease = "^0.2"
proc-macro2 = "*"
quote = "^1.0"
serde_json = "*"
syn = "^2.0"
strum = { version = "0.27", features = ["derive"] }

[build-dependencies]
regex = "*"
heck = "0.3.2"
